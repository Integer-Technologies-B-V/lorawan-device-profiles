[vendor]
  # Vendor name.
  name = "Adeunis"

  # LoRa Alliance assigned Vendor ID.
  #
  # See also:
  # https://resources.lora-alliance.org/document/lora-alliance-vendor-id-20230915
  id = 16

  # OUIs owned by vendor (optional).
  # 
  # Example: ouis = ["010203", "40506"]
  ouis = []

  # List of devices.
  #
  # This list refers to one or multiple devices in the devices/ directory.
  devices = [
    "temp_ARF8180AR.toml",
  ]

  # Vendor metadata (optional).
  [vendor.metadata]
    # Vendor homepage.
    homepage = "https://www.adeunis.com/"
